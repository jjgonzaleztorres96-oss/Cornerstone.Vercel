<svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="30%"  stop-color="#f5d062"/>
      <stop offset="55%"  stop-color="#fad84a"/>
      <stop offset="80%"  stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <!-- ── THREE-HOUSE ICON ── -->
  <g fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outermost spanning roofline -->
    <polyline points="6,125 160,6 314,125" stroke-width="5"/>
    <!-- Second layer roofline -->
    <polyline points="20,125 160,22 300,125" stroke-width="4.5"/>

    <!-- Center house inner peak -->
    <polyline points="84,125 160,52 236,125" stroke-width="4.5"/>
    <!-- Center house side walls -->
    <line x1="84" y1="125" x2="84" y2="110" stroke-width="4"/>
    <line x1="236" y1="125" x2="236" y2="110" stroke-width="4"/>

    <!-- Left mini-house peak -->
    <polyline points="6,125 66,68 126,125" stroke-width="4"/>
    <!-- Left house walls -->
    <line x1="6"   y1="125" x2="6"   y2="112" stroke-width="4"/>
    <line x1="126" y1="125" x2="126" y2="112" stroke-width="4"/>

    <!-- Right mini-house peak -->
    <polyline points="194,125 254,68 314,125" stroke-width="4"/>
    <!-- Right house walls -->
    <line x1="194" y1="125" x2="194" y2="112" stroke-width="4"/>
    <line x1="314" y1="125" x2="314" y2="112" stroke-width="4"/>

    <!-- CENTER window (large cross) -->
    <rect x="133" y="74" width="54" height="40" stroke-width="3.5"/>
    <line x1="160" y1="74"  x2="160" y2="114" stroke-width="3"/>
    <line x1="133" y1="94"  x2="187" y2="94"  stroke-width="3"/>

    <!-- LEFT window (small cross) -->
    <rect x="46"  y="90" width="30" height="22" stroke-width="3"/>
    <line x1="61"  y1="90" x2="61"  y2="112" stroke-width="2.5"/>
    <line x1="46"  y1="101" x2="76" y2="101" stroke-width="2.5"/>

    <!-- RIGHT window (small cross) -->
    <rect x="244" y="90" width="30" height="22" stroke-width="3"/>
    <line x1="259" y1="90"  x2="259" y2="112" stroke-width="2.5"/>
    <line x1="244" y1="101" x2="274" y2="101" stroke-width="2.5"/>

  </g>

  <!-- ── CORNERSTONE text ── -->
  <text
    x="160" y="155"
    text-anchor="middle"
    font-family="'Inter', 'Arial Narrow', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="8"
    fill="#d0ccc8"
  >CORNERSTONE</text>

  <!-- ── — PAINTING — ── -->
  <line x1="44"  y1="176" x2="88"  y2="176" stroke="url(#gold)" stroke-width="1.5"/>
  <text
    x="160" y="179"
    text-anchor="middle"
    font-family="'Inter', Arial, sans-serif"
    font-size="15"
    font-weight="700"
    letter-spacing="7"
    fill="url(#gold)"
  >PAINTING</text>
  <line x1="232" y1="176" x2="276" y2="176" stroke="url(#gold)" stroke-width="1.5"/>
</svg>
